services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # 내부(컨테이너 간) / 외부(호스트 PC) 리스너 분리
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # 단일 노드 KRaft
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      # 자동 토픽 생성 허용
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Idras@2024
      KC_HOSTNAME: http://auth.local:8081
      KC_HTTP_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s


  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-broker:29092"
      SPRING_CONFIG_ADDITIONAL_LOCATION: "/keycloak_config.yml,/keycloak_rbac.yml"
    extra_hosts:
      - "auth.local:host-gateway"
    volumes:
      - ./keycloak_config.yml:/keycloak_config.yml:ro
      - ./keycloak_rbac.yml:/keycloak_rbac.yml:ro

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      i=1;
      while [ $$i -le 10 ]; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --create --if-not-exists --topic demo-topic --partitions 1 --replication-factor 1 && break;
        echo "topic create retry $$i";
        i=$$((i+1));
        sleep 5;
      done;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-broker:29092 --list

  producer:
    image: apache/kafka:latest
    container_name: kafka-demo-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command: >
      i=1;
      while true; do
        echo "message-$${i} $$(date '+%Y-%m-%d %H:%M:%S')" |
        /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server kafka-broker:29092 --topic demo-topic;
        echo "produced: message-$${i}";
        i=$$((i+1));
        sleep 5;
      done

  consumer:
    image: apache/kafka:latest
    container_name: kafka-demo-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command: >
      /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server kafka-broker:29092 --topic demo-topic --from-beginning --group demo-group

volumes:
  keycloak_data: